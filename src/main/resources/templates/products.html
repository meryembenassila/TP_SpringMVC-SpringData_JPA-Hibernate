<!DOCTYPE html>
<!-- Dans products.html, ligne 4 -->
<!-- Alternative : forcer la chaîne littérale avec des guillemets simples -->
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1"
      xmlns:sec="http:///www.thymeleaf.org/extras/spring-security"
><!--indique que cette page va utimse layout layout1.html -->

<head>
    <title>Title</title>

</head>
<body>
<div class="p-3" layout:fragment="content"> <!--voici le fragement qui sera inséré il ale meme nom que layout1.html-->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <!-- Bouton New Product (uniquement pour ADMIN) -->
        <a class="btn btn-primary" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/newproduct}">New Product</a>

        <!-- Formulaire de recherche -->
        <form class="d-flex" th:action="@{/user/search}" method="get">
            <input class="form-control me-2" type="search" name="keyword" placeholder="Search" aria-label="Search">
            <button class="btn btn-outline-success me-2" type="submit">Search</button>
            <a class="btn btn-outline-danger " th:href="@{/user/index}">Rénitialiser</a>

        </form>


    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th colspan="2">Actions</th>
        </tr>

        </thead>
        <tbody>
        <tr th:each="p :${productsList}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.quantity}"></td>
            <td sec:authorize = "hasRole('ADMIN')"><!--lebouton s'affiche uniq pour admin-->
                <form method="post" th:action="@{/admin/delete(id=${p.id})}">
                    <button type="submit" class="btn btn-danger" onclick="return confirm('Etes vous sure ? ')"> Delete</button>
                </form>
            </td>
            <td sec:authorize = "hasRole('ADMIN')"><!--lebouton s'affiche uniq pour admin-->
                <form method="post" th:action="@{/admin/edit(id=${p.id})}">
                    <button type="submit" class="btn btn-primary"> Edit</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>


</body>
</html>
